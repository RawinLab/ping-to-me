# Cloudflare Workers Configuration for PingToMe Redirector
#
# This configuration manages the edge redirector service across multiple environments
# See: https://developers.cloudflare.com/workers/
#

# Base configuration
name = "pingtome-redirector"
compatibility_date = "2024-02-08"
main = "src/index.ts"
node_compat = true

# Observability
observability = { enabled = true }

# Development environment (local)
# Used for local development with `wrangler dev`
[env.development]
name = "pingtome-redirector-dev"

[env.development.vars]
API_URL = "http://localhost:3001"
ANALYTICS_API_KEY = "dev-analytics-key"

[[env.development.kv_namespaces]]
binding = "LINKS_KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
preview_id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# Local development KV namespaces for testing

# UAT/Staging environment
# Deployed from the develop branch
# Route: uat.pingto.me
[env.uat]
name = "pingtome-redirector-uat"
routes = [
  { pattern = "uat.pingto.me/*", zone_name = "pingto.me" }
]

[env.uat.vars]
API_URL = "https://uat-api.pingto.me"
ANALYTICS_API_KEY = "uat-analytics-key"

[[env.uat.kv_namespaces]]
binding = "LINKS_KV"
id = "8c2b6f0f5fab42129a80904f2e307d8e"
preview_id = "8c2b6f0f5fab42129a80904f2e307d8e"

# Production environment
# Deployed from the main branch
# Routes: pingto.me/* and *.pingto.me/*
[env.production]
name = "pingtome-redirector"
routes = [
  { pattern = "pingto.me/*", zone_name = "pingto.me" },
  { pattern = "*.pingto.me/*", zone_name = "pingto.me" }
]

[env.production.vars]
API_URL = "https://api.pingto.me"
ANALYTICS_API_KEY = "prod-analytics-key"

[[env.production.kv_namespaces]]
binding = "LINKS_KV"
id = "66922c2f638a462f9a2509fbb650271d"
preview_id = "66922c2f638a462f9a2509fbb650271d"
