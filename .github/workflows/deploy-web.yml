name: Deploy Web

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/types/**"
      - ".github/workflows/deploy-web.yml"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "uat"
        type: choice
        options:
          - uat
          - production

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/web

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ github.ref == 'refs/heads/main' && 'https://api.pingto.me' || 'https://api-uat.pingto.me' }}
            NEXT_PUBLIC_APP_URL=${{ github.ref == 'refs/heads/main' && 'https://app.pingto.me' || 'https://app-uat.pingto.me' }}

  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push' || github.event.inputs.environment == 'uat'

    environment:
      name: uat
      url: https://app-uat.pingto.me

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to UAT
        env:
          KUBECONFIG_DATA: ${{ secrets.UAT_KUBECONFIG }}
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          # Update deployment with new image
          kubectl set image deployment/web web=$IMAGE_TAG -n pingtome-uat

          # Wait for rollout
          kubectl rollout status deployment/web -n pingtome-uat --timeout=300s

          # Cleanup
          rm /tmp/kubeconfig

      - name: Health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app-uat.pingto.me || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event.inputs.environment == 'production'

    environment:
      name: production
      url: https://app.pingto.me

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        env:
          KUBECONFIG_DATA: ${{ secrets.PROD_KUBECONFIG }}
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          # Update deployment with new image
          kubectl set image deployment/web web=$IMAGE_TAG -n pingtome-prod

          # Wait for rollout
          kubectl rollout status deployment/web -n pingtome-prod --timeout=300s

          # Cleanup
          rm /tmp/kubeconfig

      - name: Health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.pingto.me || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Create GitHub Release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `web-${date}-${context.sha.substring(0, 7)}`,
              name: `Web Release ${date}`,
              body: `Automated release from commit ${context.sha}`,
              draft: false,
              prerelease: false
            });
