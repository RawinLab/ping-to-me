name: Deploy Web to Firebase App Hosting

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/types/**"
      - ".github/workflows/deploy-web-firebase.yml"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "uat"
        type: choice
        options:
          - uat
          - production

concurrency:
  group: deploy-web-firebase-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.0.0"

jobs:
  build-and-deploy:
    name: Build and Deploy to Firebase App Hosting
    runs-on: ubuntu-latest

    outputs:
      environment: ${{ steps.env.outputs.environment }}
      app_url: ${{ steps.env.outputs.app_url }}

    steps:
      - name: Determine target environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "firebase_project=pingtome-2c60e" >> $GITHUB_OUTPUT
            echo "api_url=https://api.pingto.me" >> $GITHUB_OUTPUT
            echo "app_url=https://app.pingto.me" >> $GITHUB_OUTPUT
          else
            echo "environment=uat" >> $GITHUB_OUTPUT
            echo "firebase_project=pingtome-2c60e" >> $GITHUB_OUTPUT
            echo "api_url=https://api-uat.pingto.me" >> $GITHUB_OUTPUT
            echo "app_url=https://pingtome-web--pingtome-2c60e.asia-southeast1.hosted.app" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js application
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.env.outputs.api_url }}
          NEXT_PUBLIC_APP_URL: ${{ steps.env.outputs.app_url }}
        run: pnpm --filter=web build

      - name: Verify standalone output
        run: |
          if [ ! -d "apps/web/.next/standalone" ]; then
            echo "ERROR: Standalone build output not found"
            exit 1
          fi
          echo "Standalone build verified"
          ls -la apps/web/.next/standalone/

      - name: Copy static files to standalone
        run: |
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public || true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_UAT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Deploy to Firebase App Hosting
        env:
          FIREBASE_PROJECT: ${{ steps.env.outputs.firebase_project }}
        run: |
          # Create rollout for Firebase App Hosting
          firebase apphosting:rollouts:create pingtome-web \
            --project=$FIREBASE_PROJECT \
            --git-branch=${{ github.ref_name }} \
            --force

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ steps.env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App URL**: ${{ steps.env.outputs.app_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()

    steps:
      - name: Wait for deployment to propagate
        run: sleep 60

      - name: Check deployment health
        run: |
          URL="${{ needs.build-and-deploy.outputs.app_url }}"
          echo "Checking health of: $URL"

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "Health check passed with status: $STATUS"
              exit 0
            fi
            echo "Attempt $i/10: Status $STATUS, retrying in 30s..."
            sleep 30
          done

          echo "Health check failed after 10 attempts"
          exit 1
