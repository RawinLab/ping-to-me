name: Deploy API to Cloud Run

on:
  push:
    branches:
      - develop  # UAT deployment
      - main     # Production deployment
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/deploy-api-cloudrun.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'uat'
        type: choice
        options:
          - uat
          - prod

env:
  ARTIFACT_REGISTRY_REPO: 'docker-repo'
  REGION: 'us-central1'
  REGISTRY: 'us-central1-docker.pkg.dev'

jobs:
  determine-environment:
    name: Determine Target Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      gcp-project: ${{ steps.set-env.outputs.gcp-project }}
      cloudrun-service: ${{ steps.set-env.outputs.cloudrun-service }}
      min-scale: ${{ steps.set-env.outputs.min-scale }}
      max-scale: ${{ steps.set-env.outputs.max-scale }}
      cpu: ${{ steps.set-env.outputs.cpu }}
      memory: ${{ steps.set-env.outputs.memory }}

    steps:
      - id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          else
            ENVIRONMENT="${{ github.ref == 'refs/heads/main' && 'prod' || 'uat' }}"
          fi

          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT

          if [[ "${ENVIRONMENT}" == "prod" ]]; then
            echo "gcp-project=pingtome-2c60e" >> $GITHUB_OUTPUT
            echo "cloudrun-service=api-prod" >> $GITHUB_OUTPUT
            echo "min-scale=1" >> $GITHUB_OUTPUT
            echo "max-scale=100" >> $GITHUB_OUTPUT
            echo "cpu=4" >> $GITHUB_OUTPUT
            echo "memory=4Gi" >> $GITHUB_OUTPUT
          else
            echo "gcp-project=pingtome-2c60e" >> $GITHUB_OUTPUT
            echo "cloudrun-service=api-uat" >> $GITHUB_OUTPUT
            echo "min-scale=0" >> $GITHUB_OUTPUT
            echo "max-scale=10" >> $GITHUB_OUTPUT
            echo "cpu=1" >> $GITHUB_OUTPUT
            echo "memory=512Mi" >> $GITHUB_OUTPUT
          fi

      - name: Display Configuration
        run: |
          echo "Deploying to: ${{ steps.set-env.outputs.environment }}"
          echo "Cloud Run Service: ${{ steps.set-env.outputs.cloudrun-service }}"
          echo "Min Scale: ${{ steps.set-env.outputs.min-scale }}"
          echo "Max Scale: ${{ steps.set-env.outputs.max-scale }}"
          echo "CPU: ${{ steps.set-env.outputs.cpu }}"
          echo "Memory: ${{ steps.set-env.outputs.memory }}"

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: determine-environment
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ needs.determine-environment.outputs.environment == 'prod' && secrets.GCP_SA_KEY_PROD || secrets.GCP_SA_KEY_UAT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication to Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ needs.determine-environment.outputs.gcp-project }}/${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ needs.determine-environment.outputs.gcp-project }}/${{ env.ARTIFACT_REGISTRY_REPO }}/api:latest \
            -t ${{ env.REGISTRY }}/${{ needs.determine-environment.outputs.gcp-project }}/${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ needs.determine-environment.outputs.environment }} \
            -f apps/api/Dockerfile \
            .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.REGISTRY }}/${{ needs.determine-environment.outputs.gcp-project }}/${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ needs.determine-environment.outputs.gcp-project }}/${{ env.ARTIFACT_REGISTRY_REPO }}/api:latest
          docker push ${{ env.REGISTRY }}/${{ needs.determine-environment.outputs.gcp-project }}/${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ needs.determine-environment.outputs.environment }}

      - name: Output image URI
        run: |
          echo "Image pushed: ${{ env.REGISTRY }}/${{ needs.determine-environment.outputs.gcp-project }}/${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ github.sha }}"

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [determine-environment, build-and-push]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ needs.determine-environment.outputs.environment == 'prod' && secrets.GCP_SA_KEY_PROD || secrets.GCP_SA_KEY_UAT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ needs.determine-environment.outputs.cloudrun-service }} \
            --image=${{ env.REGISTRY }}/${{ needs.determine-environment.outputs.gcp-project }}/${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --cpu=${{ needs.determine-environment.outputs.cpu }} \
            --memory=${{ needs.determine-environment.outputs.memory }} \
            --min-instances=${{ needs.determine-environment.outputs.min-scale }} \
            --max-instances=${{ needs.determine-environment.outputs.max-scale }} \
            --timeout=300 \
            --labels=environment=${{ needs.determine-environment.outputs.environment }},commit=${{ github.sha }},branch=${{ github.ref_name }}

      - name: Get Cloud Run service URL
        id: get-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ needs.determine-environment.outputs.cloudrun-service }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "service_url=${SERVICE_URL}" >> $GITHUB_OUTPUT
          echo "Cloud Run Service URL: ${SERVICE_URL}"

      - name: Wait for service to be ready
        run: |
          echo "Waiting for Cloud Run service to stabilize..."
          sleep 10

      - name: Smoke test - Health check
        run: |
          echo "Testing Cloud Run service health endpoint..."
          for i in {1..10}; do
            echo "Attempt $i/10..."
            if curl -f -s -m 10 "${{ steps.get-url.outputs.service_url }}/health/live"; then
              echo "Health check passed!"
              exit 0
            fi
            if [ $i -lt 10 ]; then
              sleep 6
            fi
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Verify readiness
        run: |
          echo "Checking readiness endpoint..."
          RESPONSE=$(curl -f -s -w "%{http_code}" -o /tmp/response.json "${{ steps.get-url.outputs.service_url }}/health/ready")
          if [ "$RESPONSE" = "200" ]; then
            echo "Service is ready!"
            cat /tmp/response.json
            exit 0
          else
            echo "Service readiness check failed with status: $RESPONSE"
            exit 1
          fi

  post-deploy:
    name: Post-Deployment Tasks
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy]
    if: success()
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ needs.determine-environment.outputs.environment == 'prod' && secrets.GCP_SA_KEY_PROD || secrets.GCP_SA_KEY_UAT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: View deployment logs
        run: |
          echo "Recent Cloud Run logs:"
          gcloud run services describe ${{ needs.determine-environment.outputs.cloudrun-service }} \
            --region=${{ env.REGION }} \
            --format='table(status.conditions[].message)'

      - name: Get service details
        run: |
          echo "Deployment to ${{ needs.determine-environment.outputs.environment }} completed successfully"
          echo "Service: ${{ needs.determine-environment.outputs.cloudrun-service }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Service Details:"
          gcloud run services describe ${{ needs.determine-environment.outputs.cloudrun-service }} \
            --region=${{ env.REGION }} \
            --format='table(status.url,status.conditions[].type,status.observedGeneration)'

      - name: Notify deployment success
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id || 0,
              state: 'success',
              description: 'Deployed to Cloud Run',
              environment_url: 'https://console.cloud.google.com/run'
            });

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy]
    if: failure() && needs.deploy.result == 'failure'
    permissions:
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ needs.determine-environment.outputs.environment == 'prod' && secrets.GCP_SA_KEY_PROD || secrets.GCP_SA_KEY_UAT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get previous stable revision
        id: get-revision
        run: |
          REVISIONS=$(gcloud run revisions list \
            --service=${{ needs.determine-environment.outputs.cloudrun-service }} \
            --region=${{ env.REGION }} \
            --format='value(name)' \
            --sort-by='~creationTimestamp' \
            --limit=2)

          if [ -z "$REVISIONS" ]; then
            echo "No previous revisions found"
            exit 1
          fi

          PREVIOUS_REVISION=$(echo "$REVISIONS" | tail -1)
          echo "previous_revision=${PREVIOUS_REVISION}" >> $GITHUB_OUTPUT
          echo "Found previous revision: ${PREVIOUS_REVISION}"

      - name: Rollback to previous revision
        if: steps.get-revision.outputs.previous_revision != ''
        run: |
          echo "Rolling back to revision: ${{ steps.get-revision.outputs.previous_revision }}"
          gcloud run services update-traffic ${{ needs.determine-environment.outputs.cloudrun-service }} \
            --to-revisions=${{ steps.get-revision.outputs.previous_revision }}=100 \
            --region=${{ env.REGION }}

          echo "Rollback completed successfully"

      - name: Create issue for failed deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[ALERT] Deployment failed and rolled back - ${{ needs.determine-environment.outputs.environment }}',
              body: `Deployment failed and rolled back to previous revision.\n\nEnvironment: ${{ needs.determine-environment.outputs.environment }}\nService: ${{ needs.determine-environment.outputs.cloudrun-service }}\nCommit: ${context.sha}\nBranch: ${context.ref}\n\nPlease check the workflow logs for details:\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPrevious revision traffic has been restored. Please investigate and fix the issues before attempting another deployment.`,
              labels: ['deployment', 'failed', 'cloudrun', '${{ needs.determine-environment.outputs.environment }}']
            });
