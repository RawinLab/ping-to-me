# Deploy Production - Triggered on push to main
# Deploys to Coolify (separate API + Web services) and Cloudflare Workers (redirector)
#
# Required secrets:
#   COOLIFY_PROD_API_WEBHOOK_URL - Coolify webhook URL for production API service
#   COOLIFY_PROD_WEB_WEBHOOK_URL - Coolify webhook URL for production Web service
#   CLOUDFLARE_API_TOKEN         - Cloudflare API token for Workers deployment
#   CLOUDFLARE_ACCOUNT_ID        - Cloudflare account ID

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  build-and-test:
    name: Build, Test & E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pingtome_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @pingtome/database db:generate

      - name: Push schema to test DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/pingtome_test
        run: pnpm --filter @pingtome/database db:push

      - name: Build all packages
        run: pnpm build

      - name: Run API unit tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/pingtome_test
          JWT_SECRET: test-jwt-secret
          REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test
        run: pnpm --filter api test

      - name: Lint
        run: pnpm lint

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Seed test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/pingtome_test
        run: pnpm --filter @pingtome/database db:seed

      - name: Run E2E tests
        working-directory: apps/web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/pingtome_test
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_APP_URL: http://localhost:3010
        run: npx playwright test --project=chromium

  deploy-api:
    name: Deploy API (Production)
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: production
      url: https://api.pingto.me

    steps:
      - name: Trigger Coolify API deploy
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_PROD_API_UUID: ${{ secrets.COOLIFY_PROD_API_UUID }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            "$COOLIFY_API_URL/api/v1/deploy?uuid=$COOLIFY_PROD_API_UUID")
          echo "Coolify API deploy response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Coolify deploy returned status $HTTP_STATUS"
            exit 1
          fi
          echo "Coolify PROD API deploy triggered successfully"

      - name: Wait for build & deploy
        run: sleep 120

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            echo "Health check attempt $i/10..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api.pingto.me/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Status: $STATUS, retrying in 30s..."
            sleep 30
          done
          echo "Health check failed after 10 attempts"
          exit 1

  deploy-web:
    name: Deploy Web (Production)
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: production
      url: https://pingto.me

    steps:
      - name: Trigger Coolify Web deploy
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_PROD_WEB_UUID: ${{ secrets.COOLIFY_PROD_WEB_UUID }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            "$COOLIFY_API_URL/api/v1/deploy?uuid=$COOLIFY_PROD_WEB_UUID")
          echo "Coolify Web deploy response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Coolify deploy returned status $HTTP_STATUS"
            exit 1
          fi
          echo "Coolify PROD Web deploy triggered successfully"

      - name: Wait for build & deploy
        run: sleep 120

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            echo "Health check attempt $i/10..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://pingto.me || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Status: $STATUS, retrying in 30s..."
            sleep 30
          done
          echo "Health check failed after 10 attempts"
          exit 1

  deploy-redirector:
    name: Deploy Redirector (Production)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Redirector to Production
        working-directory: apps/redirector
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env production
        timeout-minutes: 5
