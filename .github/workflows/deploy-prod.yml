# Deploy Production - Triggered on push to main
# Deploys to Coolify (separate API + Web services) and Cloudflare Workers (redirector)
#
# Required secrets:
#   COOLIFY_PROD_API_WEBHOOK_URL - Coolify webhook URL for production API service
#   COOLIFY_PROD_WEB_WEBHOOK_URL - Coolify webhook URL for production Web service
#   CLOUDFLARE_API_TOKEN         - Cloudflare API token for Workers deployment
#   CLOUDFLARE_ACCOUNT_ID        - Cloudflare account ID

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  build-and-test:
    name: Build, Test & E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pingtome_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @pingtome/database db:generate

      - name: Push schema to test DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/pingtome_test
        run: pnpm --filter @pingtome/database db:push

      - name: Build API
        run: pnpm --filter api build

      - name: Build Web
        run: pnpm --filter web build

      - name: Run API unit tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/pingtome_test
          JWT_SECRET: test-jwt-secret
          REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test
        run: pnpm --filter api test

      - name: Lint
        run: pnpm lint

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Seed test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/pingtome_test
        run: pnpm --filter @pingtome/database db:seed

      - name: Run E2E tests
        working-directory: apps/web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/pingtome_test
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_APP_URL: http://localhost:3010
        run: npx playwright test --project=chromium

  deploy-api:
    name: Deploy API (Production)
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: production
      url: https://api.pingto.me

    steps:
      - name: Trigger Coolify API webhook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_PROD_API_WEBHOOK_URL }}")
          echo "Coolify API webhook response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Coolify webhook returned status $HTTP_STATUS"
            exit 1
          fi
          echo "Coolify API deploy triggered successfully"

      - name: Wait for deployment to start
        run: sleep 30

      - name: Health check
        run: |
          for i in 1 2 3; do
            echo "Health check attempt $i/3..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -f https://api.pingto.me/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Status: $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1

  deploy-web:
    name: Deploy Web (Production)
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: production
      url: https://pingto.me

    steps:
      - name: Trigger Coolify Web webhook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_PROD_WEB_WEBHOOK_URL }}")
          echo "Coolify Web webhook response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Coolify webhook returned status $HTTP_STATUS"
            exit 1
          fi
          echo "Coolify Web deploy triggered successfully"

      - name: Wait for deployment to start
        run: sleep 30

      - name: Health check
        run: |
          for i in 1 2 3; do
            echo "Health check attempt $i/3..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -f https://pingto.me || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Status: $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1

  deploy-redirector:
    name: Deploy Redirector (Production)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Redirector to Production
        working-directory: apps/redirector
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env production
        timeout-minutes: 5
