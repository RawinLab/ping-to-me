# Deploy UAT - Triggered on push to develop
# Deploys to Coolify (single service: API+Web) and Cloudflare Workers (redirector)
#
# Required secrets:
#   COOLIFY_UAT_WEBHOOK_URL  - Coolify webhook URL for UAT service deployment
#   CLOUDFLARE_API_TOKEN     - Cloudflare API token for Workers deployment
#   CLOUDFLARE_ACCOUNT_ID    - Cloudflare account ID

name: Deploy UAT

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-uat
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pingtome_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter @pingtome/database db:generate
      - name: Push schema to test DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/pingtome_test
        run: pnpm --filter @pingtome/database db:push
      - name: Build API
        run: pnpm --filter api build
      - name: Build Web
        run: pnpm --filter web build
      - name: Run API unit tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/pingtome_test
          JWT_SECRET: test-jwt-secret
          REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test
        run: pnpm --filter api test
      - name: Lint
        run: pnpm lint
  deploy-uat:
    name: Deploy to UAT (Coolify)
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: uat
      url: https://uat.pingto.me
    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_UAT_UUID: ${{ secrets.COOLIFY_UAT_UUID }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            "$COOLIFY_API_URL/api/v1/deploy?uuid=$COOLIFY_UAT_UUID")
          echo "Coolify deploy response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Coolify deploy returned status $HTTP_STATUS"
            exit 1
          fi
          echo "Coolify UAT deploy triggered successfully"
      - name: Wait for build & deploy
        run: sleep 120
      - name: Health check
        run: |
          for i in $(seq 1 10); do
            echo "Health check attempt $i/10..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://uat-api.pingto.me/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Status: $STATUS, retrying in 30s..."
            sleep 30
          done
          echo "Health check failed after 10 attempts"
          exit 1
  deploy-redirector-uat:
    name: Deploy Redirector (UAT)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy Redirector to UAT
        working-directory: apps/redirector
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env uat
        timeout-minutes: 5
