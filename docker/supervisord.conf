[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/log/supervisor/supervisord.pid
childlogdir=/var/log/supervisor
user=appuser

[program:migrate]
command=node -e "const{execSync}=require('child_process');execSync('npx prisma db push --skip-generate --accept-data-loss',{stdio:'inherit',env:{...process.env,DATABASE_URL:process.env.DATABASE_URL}})"
directory=/app/packages/database
autostart=true
autorestart=false
startsecs=0
startretries=3
exitcodes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=1

[program:api]
command=node apps/api/dist/apps/api/src/main
directory=/app
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=NODE_ENV="production",PORT="3001"
priority=10

[program:web]
command=node apps/web/.next/standalone/apps/web/server.js
directory=/app
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=NODE_ENV="production",PORT="3010",HOSTNAME="0.0.0.0"
priority=10
