# ============================================================
# PingToMe Production — Nginx Reverse Proxy Configuration
# ============================================================
# Domain:       pingto.me + www.pingto.me (frontend)
#               api.pingto.me (backend API)
# Environment:  Production
#
# Deploy to:    /etc/nginx/sites-available/pingto.me
# Symlink:      ln -s /etc/nginx/sites-available/pingto.me /etc/nginx/sites-enabled/
#
# SSL:          Managed by Coolify or Let's Encrypt (certbot)
#
# Architecture: Multiple upstream instances for high availability.
#               Scale by adding more server lines to upstream blocks.
# ============================================================

# -----------------------------------------------------------
# Rate limiting zones
# -----------------------------------------------------------
# API rate limiting: 30 req/s per IP with burst allowance.
# Adjust based on your plan tier requirements.
limit_req_zone $binary_remote_addr zone=prod_api_limit:10m rate=30r/s;

# Global connection limiting — prevent connection exhaustion
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# -----------------------------------------------------------
# Upstream definitions — Multi-instance for HA
# -----------------------------------------------------------
# Frontend (Next.js) — run 2+ instances for redundancy.
# Add/remove servers as you scale horizontally.
upstream prod_web {
    least_conn;
    server 127.0.0.1:3010;
    # server 127.0.0.1:3011;  # Uncomment for 2nd instance
    keepalive 64;
}

# Backend API (NestJS) — run 2+ instances for redundancy.
upstream prod_api {
    least_conn;
    server 127.0.0.1:3001;
    # server 127.0.0.1:3002;  # Uncomment for 2nd instance
    keepalive 64;
}

# -----------------------------------------------------------
# Redirect www → bare domain
# -----------------------------------------------------------
server {
    listen 80;
    server_name www.pingto.me;
    return 301 https://pingto.me$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.pingto.me;

    ssl_certificate     /etc/letsencrypt/live/pingto.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pingto.me/privkey.pem;

    return 301 https://pingto.me$request_uri;
}

# -----------------------------------------------------------
# Frontend — pingto.me
# -----------------------------------------------------------
server {
    listen 80;
    server_name pingto.me;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pingto.me;

    # --- SSL Configuration ---
    # Production certificates — use certbot or Coolify-managed certs.
    # certbot --nginx -d pingto.me -d www.pingto.me
    ssl_certificate     /etc/letsencrypt/live/pingto.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pingto.me/privkey.pem;

    # Modern TLS — TLSv1.2 minimum, TLSv1.3 preferred
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # Session resumption for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # HSTS — 2 years with subdomain and preload
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.pingto.me https://r.pingto.me https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; frame-ancestors 'none';" always;

    # --- Connection Limits ---
    limit_conn conn_limit 100;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # --- Logging ---
    # Combined log format with upstream response time for monitoring
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time '
                    'upstream_response_time=$upstream_response_time';

    access_log /var/log/nginx/pingto.me.access.log main;
    error_log  /var/log/nginx/pingto.me.error.log warn;

    # --- Next.js Proxy ---
    location / {
        proxy_pass http://prod_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Next.js static assets — aggressive caching
        # These are content-hashed by Next.js so immutable caching is safe.
        location /_next/static/ {
            proxy_pass http://prod_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        }

        # Next.js image optimization — medium cache
        location /_next/image {
            proxy_pass http://prod_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public";
        }
    }

    # --- Health check endpoint ---
    location /health {
        proxy_pass http://prod_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}

# -----------------------------------------------------------
# Backend API — api.pingto.me
# -----------------------------------------------------------
server {
    listen 80;
    server_name api.pingto.me;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.pingto.me;

    # --- SSL Configuration ---
    ssl_certificate     /etc/letsencrypt/live/api.pingto.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pingto.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL_API:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- Security Headers ---
    # API: no framing allowed at all
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # --- Connection Limits ---
    limit_conn conn_limit 50;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml;

    # --- Logging ---
    access_log /var/log/nginx/api.pingto.me.access.log main;
    error_log  /var/log/nginx/api.pingto.me.error.log warn;

    # --- CORS Preflight ---
    # Handle OPTIONS requests for CORS — respond without hitting upstream.
    location / {
        limit_req zone=prod_api_limit burst=50 nodelay;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://pingto.me" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Api-Key" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://prod_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — generous for heavy analytics queries and exports
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        # Request body limit (file uploads for QR logos, bulk imports)
        client_max_body_size 10m;

        # Buffering settings for streaming responses (CSV exports, PDFs)
        proxy_buffering off;
    }

    # --- WebSocket endpoint for real-time analytics ---
    location /analytics/realtime {
        proxy_pass http://prod_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Persistent connection timeouts — keep WebSocket alive
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Disable buffering for real-time streaming
        proxy_buffering off;
    }

    # --- Stripe Webhook endpoint ---
    # No rate limiting for Stripe webhooks — Stripe has its own retry logic.
    location /webhooks/stripe {
        proxy_pass http://prod_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stripe requires the raw body for signature verification
        proxy_set_body $request_body;
        client_max_body_size 1m;
    }

    # --- Health check (for load balancer / monitoring) ---
    location /health {
        proxy_pass http://prod_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # --- Block Swagger/docs in production ---
    location /api/docs {
        return 404;
    }
}
