# ============================================================
# PingToMe UAT — Nginx Reverse Proxy Configuration
# ============================================================
# Domain:       uat.pingto.me (frontend)
#               uat-api.pingto.me (backend API)
# Environment:  UAT / Staging
#
# Deploy to:    /etc/nginx/sites-available/uat.pingto.me
# Symlink:      ln -s /etc/nginx/sites-available/uat.pingto.me /etc/nginx/sites-enabled/
#
# SSL:          Managed by Coolify or Let's Encrypt (certbot)
#               If using Coolify, it handles SSL termination — skip the
#               ssl_* directives and let Coolify proxy to this nginx.
# ============================================================

# -----------------------------------------------------------
# Rate limiting zones
# -----------------------------------------------------------
# Applied to API routes to prevent abuse.
# 10 requests/second per IP burstable to 20.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# -----------------------------------------------------------
# Upstream definitions (single instance for UAT)
# -----------------------------------------------------------
upstream uat_web {
    server 127.0.0.1:3010;
    keepalive 64;
}

upstream uat_api {
    server 127.0.0.1:3001;
    keepalive 64;
}

# -----------------------------------------------------------
# Frontend — uat.pingto.me
# -----------------------------------------------------------
server {
    listen 80;
    server_name uat.pingto.me;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name uat.pingto.me;

    # --- SSL Configuration ---
    # If using Coolify-managed SSL, these paths are auto-generated.
    # If using certbot directly: certbot --nginx -d uat.pingto.me
    ssl_certificate     /etc/letsencrypt/live/uat.pingto.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uat.pingto.me/privkey.pem;

    # Modern TLS — only TLSv1.2 and TLSv1.3
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling for faster TLS handshakes
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # HSTS — enforce HTTPS for 1 year (UAT only; increase for prod)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https://uat-api.pingto.me https://r.pingto.me; frame-ancestors 'none';" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # --- Logging ---
    access_log /var/log/nginx/uat.pingto.me.access.log;
    error_log  /var/log/nginx/uat.pingto.me.error.log warn;

    # --- Next.js Proxy ---
    location / {
        proxy_pass http://uat_web;
        proxy_http_version 1.1;

        # Required for Next.js HMR in dev; harmless in production
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Cache static assets served by Next.js
        location /_next/static/ {
            proxy_pass http://uat_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
    }
}

# -----------------------------------------------------------
# Backend API — uat-api.pingto.me
# -----------------------------------------------------------
server {
    listen 80;
    server_name uat-api.pingto.me;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name uat-api.pingto.me;

    # --- SSL Configuration ---
    ssl_certificate     /etc/letsencrypt/live/uat-api.pingto.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uat-api.pingto.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml;

    # --- Logging ---
    access_log /var/log/nginx/uat-api.pingto.me.access.log;
    error_log  /var/log/nginx/uat-api.pingto.me.error.log warn;

    # --- API Proxy ---
    location / {
        # Rate limiting — burst allows short spikes, nodelay returns 503 immediately
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://uat_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — API may take longer for heavy queries
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # Request body limit (file uploads, bulk imports)
        client_max_body_size 10m;
    }

    # --- WebSocket endpoint for real-time analytics ---
    location /analytics/realtime {
        proxy_pass http://uat_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for persistent WebSocket connections
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # --- Swagger API docs (UAT only — disable in prod) ---
    location /api/docs {
        proxy_pass http://uat_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
